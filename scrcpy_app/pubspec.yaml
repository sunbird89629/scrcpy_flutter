name: scrcpy_app
description: Scrcpy desktop client — Android screen mirroring.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.10.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  adb_tools:
    path: ../packages/adb_tools
  logger_utils:
    git:
      url: https://github.com/sunbird89629/logger_utils.git
      ref: v0.1.0
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  path: ^1.9.0
  scrcpy_mcp:
    path: ../scrcpy_mcp
  scrcpy_view:
    path: ../scrcpy_view
  tray_manager: ^0.4.0
  window_manager: ^0.5.0
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
flutter:
  assets:
    - assets/tray_icon.png
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/app_icon_source.png"
  macos:
    generate: true
    image_path: "assets/app_icon_source.png"
