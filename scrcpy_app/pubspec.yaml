name: scrcpy_app
description: Scrcpy desktop client — Android screen mirroring.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  path: ^1.9.0
  autoglm_adb:
    path: ../packages/autoglm_adb
