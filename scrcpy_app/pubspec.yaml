name: scrcpy_app
description: Scrcpy desktop client — Android screen mirroring.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  adb_tools:
    path: ../packages/adb_tools
  autoglm_logger:
    path: ../packages/autoglm_logger
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  path: ^1.9.0
  scrcpy_mcp:
    path: ../scrcpy_mcp
  scrcpy_view:
    path: ../scrcpy_view
  tray_manager: ^0.4.0
  window_manager: ^0.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter
flutter:
  assets:
    - assets/tray_icon.png
  uses-material-design: true
