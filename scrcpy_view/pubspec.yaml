name: scrcpy_view
description: Embeddable Flutter widget for Android screen mirroring via the Scrcpy protocol.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  path: ^1.9.0
  path_provider: ^2.1.4
  shelf: ^1.4.2
  shelf_static: ^1.1.3
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/scrcpy-server-v3.3.4
    - assets/web_player/
