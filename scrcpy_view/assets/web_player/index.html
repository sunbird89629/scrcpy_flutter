<!DOCTYPE html>
<html>
<head>
    <title>AutoGLM Scrcpy Player</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { max-width: 100%; max-height: 100%; background: #000; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let decoder = null;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let timeOffset = 0;

        // Stats batched to Dart at ~4 Hz
        const stats = { status: 'Connecting...', latencyMs: 0, fps: 0, buffered: 0, width: 0, height: 0, cssWidth: 0, cssHeight: 0 };
        let statsDirty = false;

        function updateStat(key, val) {
            if (stats[key] !== val) { stats[key] = val; statsDirty = true; }
        }

        setInterval(() => {
            const rect = canvas.getBoundingClientRect();
            updateStat('cssWidth', Math.round(rect.width));
            updateStat('cssHeight', Math.round(rect.height));
            if (!statsDirty) return;
            statsDirty = false;
            try { window.flutter_inappwebview.callHandler('statsHandler', JSON.stringify(stats)); } catch (_) {}
        }, 250);

        async function initDecoder() {
            if (decoder) decoder.close();
            decoder = new VideoDecoder({
                output: (frame) => {
                    if (canvas.width !== frame.displayWidth) {
                        canvas.width = frame.displayWidth;
                        canvas.height = frame.displayHeight;
                        updateStat('width', canvas.width);
                        updateStat('height', canvas.height);
                    }
                    ctx.drawImage(frame, 0, 0);

                    const renderTime = performance.now();
                    const hostTime = (frame.timestamp / 1000) - timeOffset;
                    updateStat('latencyMs', Math.round(renderTime - hostTime));

                    frame.close();
                    frameCount++;

                    if (renderTime - lastFpsUpdate > 1000) {
                        updateStat('fps', frameCount);
                        frameCount = 0;
                        lastFpsUpdate = renderTime;
                    }
                },
                error: (e) => {
                    updateStat('status', 'Error: ' + e.message);
                    setTimeout(location.reload, 2000);
                }
            });

            decoder.configure({
                codec: 'avc1.42E01E',
                optimizeForLatency: true,
                hardwareAcceleration: 'prefer-hardware'
            });
            updateStat('status', 'Decoder Ready');
        }

        function sendPointerEvent(action, e, rect) {
            // Report raw DOM values only; coordinate mapping is done in Flutter.
            const cssX = Math.round(e.clientX - rect.left);
            const cssY = Math.round(e.clientY - rect.top);
            const cssW = Math.round(rect.width);
            const cssH = Math.round(rect.height);
            const internalW = canvas.width || 0;
            const internalH = canvas.height || 0;
            const pressure = action === 1 ? 0 : (e.pressure > 0 ? e.pressure : 1.0);
            try {
                window.flutter_inappwebview.callHandler('touchHandler',
                    action, e.pointerId,
                    cssX, cssY,
                    cssW, cssH,
                    internalW, internalH,
                    pressure);
            } catch (_) {}
        }

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);
            sendPointerEvent(0, e, canvas.getBoundingClientRect());
        });

        canvas.addEventListener('pointermove', (e) => {
            if (e.buttons === 0 && e.pointerType === 'mouse') return;
            e.preventDefault();
            sendPointerEvent(2, e, canvas.getBoundingClientRect());
        });

        canvas.addEventListener('pointerup', (e) => {
            e.preventDefault();
            sendPointerEvent(1, e, canvas.getBoundingClientRect());
            canvas.releasePointerCapture(e.pointerId);
        });

        canvas.addEventListener('pointercancel', (e) => {
            sendPointerEvent(3, e, canvas.getBoundingClientRect());
        });

        function connect() {
            const url = new URLSearchParams(window.location.search).get('ws');
            const ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                updateStat('status', 'WS Connected');
                initDecoder();
            };

            ws.onmessage = (event) => {
                if (!decoder || decoder.state !== 'configured') return;

                const dv = new DataView(event.data);
                const hostUs = Number(dv.getBigUint64(0));
                const naluData = new Uint8Array(event.data, 8);

                const jsNow = performance.now();
                const currentOffset = (hostUs / 1000) - jsNow;
                if (timeOffset === 0) timeOffset = currentOffset;
                else timeOffset = timeOffset * 0.9 + currentOffset * 0.1;

                updateStat('buffered', decoder.decodeQueueSize);

                try {
                    const chunk = new EncodedVideoChunk({
                        type: isKeyFrame(naluData) ? 'key' : 'delta',
                        timestamp: hostUs,
                        data: naluData
                    });
                    decoder.decode(chunk);
                } catch (e) {}
            };

            ws.onclose = () => {
                updateStat('status', 'Disconnected');
                setTimeout(() => location.reload(), 2000);
            };
        }

        function isKeyFrame(data) {
            for (let i = 0; i < 20; i++) {
                if (data[i] === 0 && data[i+1] === 0 && (data[i+2] === 1 || (data[i+2] === 0 && data[i+3] === 1))) {
                    const nalType = data[i + (data[i+2] === 1 ? 3 : 4)] & 0x1F;
                    if (nalType === 7 || nalType === 5) return true;
                    if (nalType === 1) return false; // non-IDR slice frame is never a keyframe
                }
            }
            return false;
        }

        connect();
    </script>
</body>
</html>
