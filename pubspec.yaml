name: scrcpy_flutter_workspace
publish_to: none

environment:
  sdk: ^3.5.0

workspace:
  - autoglm_app
  - packages/autoglm_core
  - packages/autoglm_logger
  - packages/autoglm_ui_kit
  - packages/autoglm_adb
  - packages/scrcpy_adapters
  - scrcpy_app
  - scrcpy_mcp
  - scrcpy_view

dev_dependencies:
  melos: ^7.0.0

melos:
  command:
    bootstrap:
      runPubGetInParallel: false

  scripts:
    analyze:
      description: Run dart analyze on all packages
      exec: dart analyze --fatal-infos --fatal-warnings

    format:
      description: Verify formatting (no changes)
      exec: dart format --set-exit-if-changed .

    format:fix:
      description: Apply formatting
      exec: dart format .

    test:
      description: Run all tests
      exec: flutter test

    gen:
      description: Run build_runner for packages that need it
      exec: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        dependsOn: build_runner

    gen:i18n:
      description: Regenerate slang i18n strings (in autoglm_app)
      run: cd autoglm_app && dart run slang
