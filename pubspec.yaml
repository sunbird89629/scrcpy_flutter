name: scrcpy_flutter_workspace
publish_to: none

environment:
  sdk: ^3.5.0

workspace:
  - packages/adb_tools
  - packages/logger_utils
  - packages/scrcpy_client
  - scrcpy_app
  - scrcpy_flutter
  - scrcpy_mcp
  - scrcpy_view

dev_dependencies:
  melos: ^7.0.0

melos:
  command:
    bootstrap:
      runPubGetInParallel: false

  scripts:
    analyze:
      description: Run dart analyze on all packages
      run: dart analyze --fatal-infos --fatal-warnings
      exec:
        failFast: true

    format:
      description: Verify formatting in all packages
      run: dart format --set-exit-if-changed .
      exec:
        failFast: true

    format:fix:
      description: Apply formatting in all packages
      run: dart format .
      exec:
        failFast: true

    test:
      description: Run package tests
      run: melos exec --fail-fast --dir-exists=test -- flutter test test

    gen:
      description: Run build_runner for packages that need it
      run: dart run build_runner build --delete-conflicting-outputs
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: build_runner

