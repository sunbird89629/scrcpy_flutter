name: scrcpy_flutter_workspace
publish_to: none

environment:
  sdk: ^3.10.0

workspace:
  - packages/adb_tools
  - packages/scrcpy_client
  - scrcpy_app
  - scrcpy_flutter
  - scrcpy_mcp
  - scrcpy_plus
  - scrcpy_view

dev_dependencies:
  melos: ^7.0.0
  very_good_analysis: ^7.0.0

melos:
  command:
    bootstrap:
      runPubGetInParallel: false

  scripts:
    analyze:
      description: Run dart analyze on all packages
      run: dart analyze --fatal-infos --fatal-warnings
      exec:
        failFast: true

    format:
      description: Verify formatting in all packages
      run: dart format --set-exit-if-changed .
      exec:
        failFast: true

    format:fix:
      description: Apply formatting in all packages
      run: dart format .
      exec:
        failFast: true

    test:
      description: Run package tests (excludes real-device e2e; run those with melos run test:device)
      run: melos exec --fail-fast --dir-exists=test -- flutter test test --exclude-tags real-device

    test:device:
      description: Run real-device e2e tests (requires a connected Android device)
      run: melos exec --dir-exists=test -- flutter test test --tags real-device

    gen:
      description: Run build_runner for packages that need it
      run: dart run build_runner build --delete-conflicting-outputs
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: build_runner

